version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: enterprise-billing-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Perros..1
    ports:
      - "1433:1433" # Optional: expose port 1433 if you need to run migrations or access the database from outside
    volumes:
      - mssql-data:/var/opt/mssql
    restart: always

  webapi:
    image: enterprise-billing-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-billing-api
    user: "root"
    ports:
      - "8080:8080" # Maps port 8080 on the host to 8080 inside the container
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db;Database=EnterpriseBillingSystemDb;User Id=sa;Password=Perros..1;TrustServerCertificate=True;MultipleActiveResultSets=true
      - JwtSettings__Secret=FredermanSuperSecretKeyBillingSystem2026EnterpriseSolutions
      - JwtSettings__Issuer=EnterpriseBillingSystem.WebApi
      - JwtSettings__Audience=WpfAndFlutterClients
      - JwtSettings__ExpiryMinutes=60
    volumes:
      - uploads-data:/app/wwwroot/uploads
    depends_on:
      - db
    restart: always

volumes:
  mssql-data:
    driver: local
  uploads-data:
    driver: local
