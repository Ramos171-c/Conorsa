version: '3.8'

services:
  webapi:
    image: launion-billing-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: launion-billing-api
    user: "root"
    ports:
      - "8081:8080" # Maps port 8081 on the host to 8080 inside the container for La Union
    extra_hosts:
      - "host.docker.internal:host-gateway" # Resolves the host IP to access the shared SQL Server database
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Database=EnterpriseBillingSystemDb_LaUnion;User Id=sa;Password=Perros..1;TrustServerCertificate=True;MultipleActiveResultSets=true
      - JwtSettings__Secret=LaUnionSuperSecretKeyBillingSystem2026EnterpriseSolutions
      - JwtSettings__Issuer=EnterpriseBillingSystem.WebApi
      - JwtSettings__Audience=WpfAndFlutterClients
      - JwtSettings__ExpiryMinutes=60
    volumes:
      - launion-uploads-data:/app/wwwroot/uploads
    restart: always

volumes:
  launion-uploads-data:
    driver: local
